name: Build Motorola Edge SM8250 KernelSU

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Build Script
        uses: actions/checkout@v4

      # 1. 升级 Node.js 到 20 以上版本
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 2. 核心：修复 Ubuntu 22.04 缺失的旧版依赖 (python2, libncurses5, libtinfo5)
      - name: Install Dependencies & Force Link Libs
        run: |
          sudo apt-get update
          # 1. 安装当前系统存在的最新版库
          sudo apt-get install -y python3 python-is-python3 libncurses6 libncurses-dev \
            libtinfo6 libssl-dev bc build-essential flex bison lld libelf-dev libselinux1-dev

          # 2. 核心：建立软链接欺骗 Clang 编译器 (解决 libtinfo.so.5 缺失)
          # 获取当前库的实际路径并链接
          LIBTINFO_PATH=$(find /usr/lib/x86_64-linux-gnu -name "libtinfo.so.6" | head -n 1)
          LIBNCURSES_PATH=$(find /usr/lib/x86_64-linux-gnu -name "libncurses.so.6" | head -n 1)
          
          sudo ln -sf $LIBTINFO_PATH /usr/lib/x86_64-linux-gnu/libtinfo.so.5
          sudo ln -sf $LIBNCURSES_PATH /usr/lib/x86_64-linux-gnu/libncurses.so.5
          
          # 3. 验证链接是否成功
          ls -l /usr/lib/x86_64-linux-gnu/libtinfo.so.5

          
          # 【核心修复 2】：解决 Clang 找不到 libtinfo.so.5 的问题
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libtinfo.so.6 /usr/lib/x86_64-linux-gnu/libtinfo.so.5
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libncurses.so.6 /usr/lib/x86_64-linux-gnu/libncurses.so.5

      # 3. 下载 AOSP 官方 Clang (r487747c 兼容性极佳)
      - name: Setup Toolchain
        run: |
          mkdir -p clang
          cd clang
          wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r487747c.tar.gz
          tar -xf *.tar.gz
          cd ..

      # 4. 克隆内核源码并集成 KernelSU
      - name: Clone Kernel Source & Integrate KSU
        run: |
          git clone --depth=1 -b erofs https://github.com/tao1996/android_kernel_motorola_sm8250.git kernel-source
          cd kernel-source
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -

      # 5. 编译内核
      - name: Build Kernel
        run: |
          cd kernel-source
          export PATH=$(pwd)/../clang/bin:$PATH
          export ARCH=arm64
          export SUBARCH=arm64
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # 生成配置
          make O=out nio_defconfig
          
          # 启用 KernelSU 配置
          scripts/config --file out/.config -e KERNELSU
          
          # 正式开始编译
          make -j$(nproc) O=out \
                      CC=clang \
                      LD=ld.lld \
                      AR=llvm-ar \
                      NM=llvm-nm \
                      OBJCOPY=llvm-objcopy \
                      OBJDUMP=llvm-objdump \
                      STRIP=llvm-strip

      # 6. 使用 AnyKernel3 打包
      - name: Package with AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cp kernel-source/out/arch/arm64/boot/Image.gz AnyKernel3/
          cd AnyKernel3
          zip -r9 ../KernelSU-Motorola-Nio.zip * -x .git* README.md

      # 7. 上传成果
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Motorola-Edge-KSU-Kernel
          path: KernelSU-Motorola-Nio.zip
